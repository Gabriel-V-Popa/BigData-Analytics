# ==========================================
# CONFIGURATION FILE: fineExp Dataset
# ==========================================
# You can insert a single value (e.g., 5) or a list (e.g., [5, 10, 15])
# to run batch experiments via the Orchestrator.

# --- A SCENARIOS: Global & Frequency ---
# A2_top: How many top-frequent anomalies to select?
top_k: [5, 10, 15]

# A2_bottom: How many least-frequent anomalies to select?
bottom_k: [5, 10]


# --- B SCENARIOS: Structural & Topological ---
# B1_exact: Which exact Graph Edit Distance value to look for?
exact_ged: 2

# B1_extreme_min: Minimum GED threshold for highly complex anomalies
min_extreme_ged: [3, 4, 5]

# B1_extreme_max: Maximum GED threshold 
max_extreme_ged: 6

# B2_bottleneck: How many nodes to consider as temporal "Top Bottlenecks"?
top_k_bottlenecks: [2, 3]


# --- C SCENARIOS: Semantic & Context (Coming Soon) ---
# Minimum cosine similarity threshold to consider two activities "interchangeable"
semantic_similarity_threshold: 0.85


# --- D SCENARIOS: Performance (Coming Soon) ---
# Unit of measurement for temporal bottlenecks calculation
time_unit: "days"